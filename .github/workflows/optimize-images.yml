name: Optimize item images

on:
  push:
    branches: [main]
    paths:
      - "data/items.json"
      - "media/items/**"
      - "scripts/cleanup_removed_images.py"
      - "scripts/optimize_images.py"
      - ".github/workflows/optimize-images.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: optimize-item-images
  cancel-in-progress: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install Pillow==12.2.0

      - name: Delete photos removed from item data
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          BEFORE_REF: ${{ github.event.before }}
        run: python scripts/cleanup_removed_images.py --before-ref "$BEFORE_REF"

      - name: Generate optimized images and manifest
        run: python scripts/optimize_images.py

      - name: Commit image updates
        id: image_commit
        run: |
          git add -A -- media/items media/optimized
          if git diff --cached --quiet; then
            echo "Item images are already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update optimized item images"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Request GitHub Pages build
        if: steps.image_commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${{ github.repository }}/pages/builds"
