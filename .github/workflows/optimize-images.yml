name: Optimize item images

on:
  push:
    branches: [main]
    paths:
      - "media/items/**"
      - "scripts/optimize_images.py"
      - ".github/workflows/optimize-images.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: optimize-item-images
  cancel-in-progress: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install Pillow==12.2.0

      - name: Generate optimized images
        run: python scripts/optimize_images.py

      - name: Commit generated images
        run: |
          git add media/optimized
          if git diff --cached --quiet; then
            echo "Optimized images are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Optimize item images"
          git push
